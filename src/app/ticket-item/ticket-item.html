<div class="ticket-control">
  <h2 class="event-name">{{ eventName() }}</h2>

  <div class="quantity">
    <button class="qty-btn" (click)="decrement()">−</button>

    <span class="qty-value">{{ quantity() }}</span>

    <button class="qty-btn" (click)="increment()">+</button>
  </div>

  <div class="discount">
    <input type="text" placeholder="Código de desconto" (keyup.enter)="discount($event)" />
  </div>

  <button class="confirm-btn" (click)="confirmTicket()">Confirmar</button>
  <button class="cancel-btn" (click)="showCanceled()">Solicitar cancelamento</button>
</div>
